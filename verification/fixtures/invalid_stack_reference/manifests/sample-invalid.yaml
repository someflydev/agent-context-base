schema_version: 2
name: sample-invalid
description: Invalid manifest fixture with a missing stack file.
archetype: prompt-first-repo
primary_stack: prompt-first-repo
secondary_stacks:
  - prompt-first-repo
triggers:
  - prompt first repo
aliases:
  - broken fixture repo
