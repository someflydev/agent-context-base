  - context/doctrine/compose-port-and-data-isolation.md
preferred_examples:
  - examples/canonical-dokku/README.md
  - examples/canonical-smoke-tests/README.md
warnings:
  - Keep the boot command and templ asset path explicit so Dokku behavior is predictable.

