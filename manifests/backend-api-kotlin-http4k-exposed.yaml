schema_version: 2
name: backend-api-kotlin-http4k-exposed
description: Preferred Kotlin backend profile using http4k for transport and Exposed for explicit storage-backed endpoint examples.
archetype: backend-api-service
primary_stack: kotlin-http4k-exposed
secondary_stacks:
  - redis-keydb-mongo
triggers:
  - kotlin api
  - http4k service
  - exposed backend
aliases:
  - kotlin http4k
  - exposed service
required_context:
  - context/doctrine/core-principles.md
  - context/doctrine/testing-philosophy.md
  - context/doctrine/compose-port-and-data-isolation.md
  - context/workflows/add-api-endpoint.md
  - context/stacks/kotlin-http4k-exposed.md
  - context/archetypes/backend-api-service.md
optional_context:
  - context/workflows/add-smoke-tests.md
  - context/workflows/add-storage-integration.md
  - context/workflows/post-flight-refinement.md
  - context/doctrine/canonical-examples.md
preferred_examples:
  - examples/canonical-api/kotlin-http4k-exposed-api-endpoint-example.kt
  - examples/canonical-api/kotlin-http4k-exposed-html-fragment-example.kt
  - examples/canonical-api/kotlin-http4k-exposed-data-endpoint-example.kt
  - examples/canonical-api/kotlin-http4k-exposed-example/src/main/kotlin/example/Main.kt
recommended_templates:
  - templates/readme/README.template.md
  - templates/agent-md/AGENT.template.md
  - templates/claude-md/CLAUDE.template.md
  - templates/gitignore/.gitignore.template
  - templates/compose/docker-compose.template.yaml
  - templates/compose/docker-compose-test.template.yaml
  - templates/manifest/profile-summary.template.yaml
repo_signals:
  - build.gradle.kts
  - settings.gradle.kts
  - src/main/kotlin/
  - src/test/kotlin/
task_hints:
  - add-api-endpoint
  - add-smoke-tests
  - add-storage-integration
  - post-flight-refinement
warnings:
  - Keep http4k routes explicit instead of hiding them behind reflection-heavy adapter layers.
  - Keep Exposed query and seed helpers small and named so assistants can modify them safely.
  - Prefer Docker-backed smoke verification by default so host Kotlin tooling stays optional.
bootstrap_defaults:
  - include_docker_compose
  - include_smoke_tests
  - include_integration_tests
  - include_generated_profile
compose_files:
  - docker-compose.yml
  - docker-compose.test.yml
compose_project_name_dev: "{repo_slug}"
compose_project_name_test: "{repo_slug}-test"
port_band_app_dev: 14000-14099
port_band_app_test: 15000-15099
port_band_data_dev: 24000-24099
port_band_data_test: 25000-25099
data_isolation:
  - docker/volumes/dev
  - docker/volumes/test
  - destructive test cleanup must stay scoped to docker-compose.test.yml resources only
dokku_relevance: optional
smoke_test_expectations:
  - boot health route
  - representative JSON API check
  - one HTML fragment check
  - one chart dataset check
prompt_first_support: supported
