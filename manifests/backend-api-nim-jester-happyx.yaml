schema_version: 2
name: backend-api-nim-jester-happyx
description: Preferred Nim backend profile using Jester for routing and HappyX for explicit HTML fragment surfaces.
archetype: backend-api-service
primary_stack: nim-jester-happyx
secondary_stacks:
  - redis-keydb-mongo
triggers:
  - nim api
  - jester backend
  - happyx fragment
aliases:
  - nim service
  - jester route
required_context:
  - context/doctrine/core-principles.md
  - context/doctrine/testing-philosophy.md
  - context/doctrine/compose-port-and-data-isolation.md
  - context/workflows/add-api-endpoint.md
  - context/stacks/nim-jester-happyx.md
  - context/archetypes/backend-api-service.md
optional_context:
  - context/workflows/add-smoke-tests.md
  - context/workflows/add-storage-integration.md
  - context/workflows/post-flight-refinement.md
  - context/doctrine/canonical-examples.md
preferred_examples:
  - examples/canonical-api/nim-jester-json-endpoint-example.nim
  - examples/canonical-api/nim-happyx-html-fragment-example.nim
  - examples/canonical-api/nim-jester-data-endpoint-example.nim
  - examples/canonical-api/nim-jester-happyx-example/main.nim
recommended_templates:
  - templates/readme/README.template.md
  - templates/agent-md/AGENT.template.md
  - templates/claude-md/CLAUDE.template.md
  - templates/compose/docker-compose.template.yaml
  - templates/compose/docker-compose-test.template.yaml
  - templates/manifest/profile-summary.template.yaml
repo_signals:
  - "*.nimble"
  - src/main.nim
  - src/http/
  - tests/
task_hints:
  - add-api-endpoint
  - add-smoke-tests
  - add-storage-integration
  - post-flight-refinement
warnings:
  - Keep Jester route bodies narrow and move HTML or dataset shaping into named helpers.
  - Use Docker-backed smoke checks by default so verification does not depend on host Nim tooling.
bootstrap_defaults:
  - include_docker_compose
  - include_smoke_tests
  - include_integration_tests
  - include_generated_profile
compose_files:
  - docker-compose.yml
  - docker-compose.test.yml
compose_project_name_dev: "{repo_slug}"
compose_project_name_test: "{repo_slug}-test"
port_band_app_dev: 14000-14099
port_band_app_test: 15000-15099
port_band_data_dev: 24000-24099
port_band_data_test: 25000-25099
data_isolation:
  - docker/volumes/dev
  - docker/volumes/test
  - test resets must stay scoped to docker-compose.test.yml resources only
dokku_relevance: optional
smoke_test_expectations:
  - boot health route
  - representative JSON API check
  - fragment or chart-data route check
prompt_first_support: supported
