kind: infra
slug: compose-dokku
summary: Conventional Compose and Dokku-oriented local infrastructure rules.
load_order: 30
required_files:
  - context/doctrine/04-compose-port-isolation.md
  - context/stacks/docker-compose-dokku.md
optional_files:
  - examples/canonical/docker-compose/README.md
trigger_keywords:
  - docker compose
  - dokku
  - ports
  - local infra
  - test stack
compatibility:
  archetypes:
    - backend-api
    - data-pipeline
    - local-rag-system
    - multi-storage-experiment
    - polyglot-lab
compose:
  dev_file: docker-compose.yml
  test_file: docker-compose.test.yml
  name_from_repo_slug: true
  test_suffix: "-test"
ports:
  explicit_non_default_host_ports: true
  dev_band: "18xxx"
  test_band: "28xxx"
isolation:
  separate_env_files: true
  separate_volumes: true
  separate_seed_flows: true
  separate_fixture_data: true
  separate_databases_and_indexes: true
