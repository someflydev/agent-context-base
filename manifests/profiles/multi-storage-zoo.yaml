schema_version: 1
kind: context_profile
name: Multi-Storage Zoo
slug: multi-storage-zoo
summary: Experiment profile for comparing and combining multiple storage systems behind isolated Docker-backed local infrastructure.
archetypes:
  - multi-storage-experiment
  - data-pipeline
stacks:
  - redis-mongodb
  - trino-duckdb-polars
  - nats-jetstream-meilisearch
  - timescaledb-elasticsearch-qdrant
  - docker-compose-dokku
compatible_workflows:
  - bootstrap-repo
  - add-storage-integration
  - add-seed-data
  - add-smoke-tests
  - refactor
required_context:
  doctrine:
    - context/doctrine/00-core-principles.md
    - context/doctrine/02-testing-philosophy.md
    - context/doctrine/03-smoke-test-philosophy.md
    - context/doctrine/04-compose-port-isolation.md
    - context/doctrine/11-single-service-bias.md
  workflows:
    - context/workflows/add-storage-integration.md
  archetypes:
    - context/archetypes/multi-storage-experiment.md
    - context/archetypes/data-pipeline.md
  stacks:
    - context/stacks/redis-mongodb.md
    - context/stacks/trino-duckdb-polars.md
    - context/stacks/nats-jetstream-meilisearch.md
    - context/stacks/timescaledb-elasticsearch-qdrant.md
optional_context:
  workflows:
    - context/workflows/add-seed-data.md
    - context/workflows/add-smoke-tests.md
  stacks:
    - context/stacks/docker-compose-dokku.md
load_order:
  - README.md
  - AGENT.md
  - manifests/repo.profile.yaml
  - context/router/task-router.md
trigger_words:
  - redis
  - mongo
  - trino
  - duckdb
  - qdrant
  - elasticsearch
repo_signals:
  files:
    - docker-compose.yml
  directories:
    - infra
    - tests
    - scripts
preferred_examples:
  - examples/canonical/storage-integration
  - examples/canonical/docker-compose
anti_patterns:
  - shared test and dev indexes or volumes
  - treating experiment repos as if every component must deploy together
bootstrap_defaults:
  compose:
    dev_file: docker-compose.yml
    test_file: docker-compose.test.yml
    dev_name_pattern: "<repo_slug>"
    test_name_pattern: "<repo_slug>-test"
  ports:
    dev_band: "18800-18899"
    test_band: "28800-28899"
    disallow_default_host_ports: true
  isolation:
    dev_env_file: .env
    test_env_file: .env.test
    dev_data_root: ./.data/dev
    test_data_root: ./.data/test
    separate_seed_flows: true
    separate_fixture_data: true
    separate_volumes: true
