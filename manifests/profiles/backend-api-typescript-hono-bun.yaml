schema_version: 1
kind: context_profile
name: Backend API TypeScript Hono Bun
slug: backend-api-typescript-hono-bun
summary: Backend API starter profile for Hono, Bun, Drizzle ORM, and TSX services.
archetypes:
  - backend-api
stacks:
  - typescript-hono-bun-drizzle-tsx
  - docker-compose-dokku
compatible_workflows:
  - add-feature
  - fix-bug
  - add-api-endpoint
  - add-smoke-tests
  - add-storage-integration
  - add-deployment-support
required_context:
  doctrine:
    - context/doctrine/00-core-principles.md
    - context/doctrine/02-testing-philosophy.md
    - context/doctrine/03-smoke-test-philosophy.md
  workflows:
    - context/workflows/add-api-endpoint.md
  archetypes:
    - context/archetypes/backend-api.md
  stacks:
    - context/stacks/typescript-hono-bun-drizzle-tsx.md
optional_context:
  doctrine:
    - context/doctrine/04-compose-port-isolation.md
    - context/doctrine/10-deployment-dokku-thinking.md
  workflows:
    - context/workflows/add-storage-integration.md
    - context/workflows/add-deployment-support.md
  stacks:
    - context/stacks/docker-compose-dokku.md
load_order:
  - README.md
  - AGENT.md
  - manifests/repo.profile.yaml
  - context/router/task-router.md
trigger_words:
  - hono
  - bun
  - drizzle
  - tsx
repo_signals:
  files:
    - package.json
    - bun.lockb
  directories:
    - src
    - tests
preferred_examples:
  - examples/canonical/api-endpoints
  - examples/canonical/smoke-tests
anti_patterns:
  - express-style middleware drift
  - npm-first assumptions in bun repos
bootstrap_defaults:
  compose:
    dev_file: docker-compose.yml
    test_file: docker-compose.test.yml
    dev_name_pattern: "<repo_slug>"
    test_name_pattern: "<repo_slug>-test"
  ports:
    dev_band: "18200-18299"
    test_band: "28200-28299"
    disallow_default_host_ports: true
  isolation:
    dev_env_file: .env
    test_env_file: .env.test
    dev_data_root: ./.data/dev
    test_data_root: ./.data/test
    separate_seed_flows: true
    separate_fixture_data: true
    separate_volumes: true
