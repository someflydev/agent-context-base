schema_version: 1
kind: context_profile
name: CLI Python
slug: cli-python
summary: CLI starter profile for Python utilities with explicit smoke coverage and clean command routing.
archetypes:
  - cli-tool
stacks:
  - python-fastapi-polars-htmx-plotly
compatible_workflows:
  - bootstrap-repo
  - extend-cli
  - fix-bug
  - add-smoke-tests
required_context:
  doctrine:
    - context/doctrine/00-core-principles.md
    - context/doctrine/01-naming-and-clarity.md
    - context/doctrine/02-testing-philosophy.md
  workflows:
    - context/workflows/extend-cli.md
  archetypes:
    - context/archetypes/cli-tool.md
  stacks:
    - context/stacks/python-fastapi-polars-htmx-plotly.md
optional_context:
  doctrine:
    - context/doctrine/03-smoke-test-philosophy.md
  workflows:
    - context/workflows/add-smoke-tests.md
load_order:
  - README.md
  - AGENT.md
  - manifests/repo.profile.yaml
  - context/router/task-router.md
trigger_words:
  - cli
  - command
  - subcommand
  - python
repo_signals:
  files:
    - pyproject.toml
  directories:
    - cli
    - tests
preferred_examples:
  - examples/canonical/cli
  - examples/canonical/smoke-tests
anti_patterns:
  - forcing web-service layout onto cli repos
  - help text without smoke coverage
bootstrap_defaults:
  compose:
    dev_file: docker-compose.yml
    test_file: docker-compose.test.yml
    dev_name_pattern: "<repo_slug>"
    test_name_pattern: "<repo_slug>-test"
  ports:
    dev_band: "18900-18999"
    test_band: "28900-28999"
    disallow_default_host_ports: true
  isolation:
    dev_env_file: .env
    test_env_file: .env.test
    dev_data_root: ./.data/dev
    test_data_root: ./.data/test
    separate_seed_flows: true
    separate_fixture_data: true
    separate_volumes: true
