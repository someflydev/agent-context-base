schema_version: 1
kind: context_profile
name: Data Pipeline Polars
slug: data-pipeline-polars
summary: Data pipeline starter profile for Polars, DuckDB, and reproducible local batch workflows.
archetypes:
  - data-pipeline
stacks:
  - trino-duckdb-polars
  - python-fastapi-polars-htmx-plotly
compatible_workflows:
  - bootstrap-repo
  - add-feature
  - add-seed-data
  - add-smoke-tests
  - refactor
required_context:
  doctrine:
    - context/doctrine/00-core-principles.md
    - context/doctrine/02-testing-philosophy.md
    - context/doctrine/03-smoke-test-philosophy.md
    - context/doctrine/04-compose-port-isolation.md
  workflows:
    - context/workflows/add-feature.md
    - context/workflows/add-seed-data.md
  archetypes:
    - context/archetypes/data-pipeline.md
  stacks:
    - context/stacks/trino-duckdb-polars.md
optional_context:
  workflows:
    - context/workflows/add-smoke-tests.md
  stacks:
    - context/stacks/python-fastapi-polars-htmx-plotly.md
load_order:
  - README.md
  - AGENT.md
  - manifests/repo.profile.yaml
  - context/router/task-router.md
trigger_words:
  - pipeline
  - batch
  - polars
  - duckdb
repo_signals:
  files:
    - pyproject.toml
  directories:
    - jobs
    - pipelines
    - tests
preferred_examples:
  - examples/canonical/seed-data
  - examples/canonical/smoke-tests
anti_patterns:
  - non-deterministic local datasets
  - mixing test fixtures with dev pipeline outputs
bootstrap_defaults:
  compose:
    dev_file: docker-compose.yml
    test_file: docker-compose.test.yml
    dev_name_pattern: "<repo_slug>"
    test_name_pattern: "<repo_slug>-test"
  ports:
    dev_band: "19000-19099"
    test_band: "29000-29099"
    disallow_default_host_ports: true
  isolation:
    dev_env_file: .env
    test_env_file: .env.test
    dev_data_root: ./.data/dev
    test_data_root: ./.data/test
    separate_seed_flows: true
    separate_fixture_data: true
    separate_volumes: true
