kind: repo_profile
slug: your-repo-slug
summary: Replace with a one-line repo summary.
load_order: 10
archetypes: []
required_files:
  - README.md
  - AGENT.md
  - CLAUDE.md
trigger_keywords: []
compatibility:
  archetypes: []
  stacks: []
infra:
  compose:
    dev_file: docker-compose.yml
    test_file: docker-compose.test.yml
    dev_name: your-repo-slug
    test_name: your-repo-slug-test
  ports:
    dev_band: "18xxx"
    test_band: "28xxx"
    disallow_default_host_ports: true
  isolation:
    separate_env_files: true
    separate_volumes: true
    separate_seed_flows: true
