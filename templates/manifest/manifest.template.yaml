schema_version: 2
name: example-manifest-name
description: Replace with a short description of the repo profile.
archetype: backend-api-service
primary_stack: python-fastapi-uv-ruff-orjson-polars
secondary_stacks:
  - redis-keydb-mongo
triggers:
  - plain language trigger
aliases:
  - short alias
required_context:
  - context/doctrine/core-principles.md
optional_context:
  - context/workflows/add-feature.md
preferred_examples:
  - examples/canonical-api/fastapi-endpoint-example.py
recommended_templates:
  - templates/readme/README.template.md
  - templates/agent-md/AGENT.template.md
repo_signals:
  - pyproject.toml
  - tests/smoke/
task_hints:
  - add-feature
warnings:
  - Replace this warning with a repo-specific boundary note.
bootstrap_defaults:
  - include_docker_compose
  - include_smoke_tests
compose_files:
  - docker-compose.yml
  - docker-compose.test.yml
compose_project_name_dev: "{repo_slug}"
compose_project_name_test: "{repo_slug}-test"
port_band_app_dev: 14000-14099
port_band_app_test: 15000-15099
port_band_data_dev: 24000-24099
port_band_data_test: 25000-25099
data_isolation:
  - docker/volumes/dev
  - docker/volumes/test
dokku_relevance: supported
smoke_test_expectations:
  - boot health route
  - representative happy path
prompt_first_support: supported
