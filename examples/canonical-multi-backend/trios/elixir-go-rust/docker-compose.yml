services:
  nats:
    image: nats:2.10-alpine
    command: "-js"
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  rust-kernel:
    build:
      context: .
      dockerfile_inline: |
        FROM rust:1.77-slim AS builder
        RUN apt-get update && apt-get install -y protobuf-compiler && rm -rf /var/lib/apt/lists/*
        WORKDIR /app
        COPY service.proto .
        RUN cargo init --name rust_kernel
        RUN cat > Cargo.toml << 'CARGOTOML'
        [package]
        name = "rust_kernel"
        version = "0.1.0"
        edition = "2021"

        [dependencies]
        tonic = "0.12"
        prost = "0.13"
        tokio = { version = "1", features = ["full"] }
        http-body-util = "0.1"
        hyper = { version = "1", features = ["full"] }
        hyper-util = { version = "0.1", features = ["tokio"] }

        [build-dependencies]
        tonic-build = "0.12"
        CARGOTOML
        RUN echo 'fn main() -> Result<(), Box<dyn std::error::Error>> { tonic_build::compile_protos("service.proto")?; Ok(()) }' > build.rs
        COPY rust-side.rs src/main.rs
        RUN cargo build --release
        FROM debian:bookworm-slim
        RUN apt-get update && apt-get install -y curl && rm -rf /var/lib/apt/lists/*
        COPY --from=builder /app/target/release/rust_kernel /rust_kernel
        CMD ["/rust_kernel"]
    ports:
      - "50051:50051"
      - "8082:8082"
    environment:
      GRPC_PORT: "50051"
      HEALTH_PORT: "8082"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      # Rust compiles from source on first build — allow extra time.
      start_period: 60s

  go-workers:
    build:
      context: .
      dockerfile_inline: |
        FROM golang:1.22-alpine AS builder
        RUN apk add --no-cache protobuf protobuf-dev
        WORKDIR /app
        RUN go mod init github.com/example/elixir-go-rust
        RUN go get github.com/nats-io/nats.go@latest \
            google.golang.org/grpc@latest \
            google.golang.org/protobuf@latest
        RUN go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest \
            && go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
        COPY service.proto .
        RUN mkdir -p gen/kernel/v1 && \
            protoc --go_out=. --go-grpc_out=. \
                   --go_opt=paths=source_relative \
                   --go-grpc_opt=paths=source_relative \
                   service.proto
        COPY go-side.go main.go
        RUN go build -o server .
        FROM alpine:3.19
        RUN apk add --no-cache curl
        COPY --from=builder /app/server /server
        CMD ["/server"]
    ports:
      - "8080:8080"
    environment:
      NATS_URL: "nats://nats:4222"
      RUST_GRPC_ADDR: "rust-kernel:50051"
      HTTP_PORT: "8080"
    depends_on:
      nats:
        condition: service_healthy
      rust-kernel:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  elixir-coordinator:
    build:
      context: .
      dockerfile_inline: |
        FROM elixir:1.16-alpine
        WORKDIR /app
        RUN mix local.hex --force && mix local.rebar --force
        RUN mix new coordinator --module ElixirCoordinator
        WORKDIR /app/coordinator
        RUN printf 'defmodule ElixirCoordinator.MixProject do\n  use Mix.Project\n  def project, do: [app: :elixir_coordinator, version: "0.1.0", elixir: "~> 1.16", deps: deps()]\n  def application, do: [extra_applications: [:logger, :inets], mod: {ElixirCoordinator.Application, []}]\n  defp deps, do: [{:gnat, "~> 1.7"}, {:jason, "~> 1.4"}, {:plug_cowboy, "~> 2.7"}]\nend\n' > mix.exs
        RUN mix deps.get
        COPY elixir-side.ex lib/elixir_coordinator.ex
        RUN mix compile
        CMD ["mix", "run", "--no-halt"]
    ports:
      - "4000:4000"
    environment:
      NATS_URL: "nats://nats:4222"
      HTTP_PORT: "4000"
    # Design decision: elixir-coordinator depends ONLY on NATS — NOT on go-workers.
    # Elixir publishes tasks to NATS JetStream, which stores them durably. If Go workers
    # are not yet ready when Elixir boots and publishes, the WORK_TASKS stream retains
    # the message until Go subscribes. This avoids strict boot ordering between
    # elixir-coordinator and go-workers: the seam contract is fulfilled by the broker,
    # not by startup sequence. Go's depends_on ensures it waits for nats + rust-kernel
    # before subscribing, so no messages are missed.
    depends_on:
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 25s
