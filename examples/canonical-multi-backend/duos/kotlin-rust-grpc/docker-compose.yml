services:
  rust-service:
    build:
      context: .
      dockerfile_inline: |
        FROM rust:1.82-slim AS builder
        WORKDIR /app
        # Install protoc for tonic_build code generation
        RUN apt-get update && apt-get install -y protobuf-compiler && rm -rf /var/lib/apt/lists/*
        COPY Cargo.toml Cargo.lock build.rs ./
        COPY service.proto ./
        COPY rust-server.rs src/main.rs
        RUN mkdir -p src && cargo build --release
        FROM debian:bookworm-slim
        RUN apt-get update && apt-get install -y curl && rm -rf /var/lib/apt/lists/*
        COPY --from=builder /app/target/release/rust-server /rust-server
        EXPOSE 50051 8082
        CMD ["/rust-server"]
    ports:
      - "50051:50051"
      - "8082:8082"
    environment:
      GRPC_PORT: "50051"
      HEALTH_PORT: "8082"
    healthcheck:
      # Uses the HTTP sidecar on port 8082; replace with grpc_health_probe if available.
      # grpc_health_probe install: https://github.com/grpc-ecosystem/grpc-health-probe
      # test: ["CMD", "grpc_health_probe", "-addr=:50051"]
      test: ["CMD", "curl", "-f", "http://localhost:8082/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

  kotlin-service:
    build:
      context: .
      dockerfile_inline: |
        FROM gradle:8.10-jdk21 AS builder
        WORKDIR /app
        COPY build.gradle.kts settings.gradle.kts ./
        COPY service.proto src/main/proto/service.proto
        COPY kotlin-caller.kt src/main/kotlin/Main.kt
        RUN gradle shadowJar --no-daemon
        FROM openjdk:21-slim
        WORKDIR /app
        COPY --from=builder /app/build/libs/*-all.jar app.jar
        EXPOSE 8080
        CMD ["java", "-jar", "app.jar"]
    ports:
      - "8080:8080"
    environment:
      RUST_GRPC_URL: rust-service:50051
      PORT: "8080"
    depends_on:
      rust-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 40s
