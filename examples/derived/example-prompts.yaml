examples:

  # ── Category A — Single-Backend API Services ──────────────────────────────

  - number: 1
    codename: partner-data-enrichment
    category: A
    category_name: Single-Backend API Services
    prompt: |
      Build a FastAPI service that normalizes incoming JSON from multiple partner APIs into
      a unified schema stored in PostgreSQL. Use Polars for in-memory transformation and
      implement cursor-based pagination for the list endpoint. Smoke tests verify the health
      endpoint and at least one query endpoint returns normalized records from seed data.
    new_repo_args:
      archetype: backend-api-service
      primary_stack: python-fastapi-uv-ruff-orjson-polars
      smoke_tests: true
      integration_tests: false
      seed_data: true
      dokku: false

  - number: 2
    codename: analytics-parquet-api
    category: A
    category_name: Single-Backend API Services
    prompt: |
      Build a FastAPI analytics service that reads from a directory of Parquet files using
      DuckDB, exposing aggregate and trend query endpoints. Polars handles result
      transformation before JSON serialization. Smoke tests confirm at least two aggregate
      endpoints return correct totals from seeded fixture Parquet files.
    new_repo_args:
      archetype: backend-api-service
      primary_stack: python-fastapi-uv-ruff-orjson-polars
      smoke_tests: true
      integration_tests: false
      seed_data: true
      dokku: false

  - number: 3
    codename: timeseries-ingest
    category: A
    category_name: Single-Backend API Services
    prompt: |
      Build a FastAPI ingestion service that writes time-series records to a TimescaleDB
      hypertable with batch-flush writes and exposes windowed aggregate query endpoints.
      Seed with timestamps spread across multiple time windows. Smoke tests verify both the
      ingest endpoint and at least one windowed aggregate.
    new_repo_args:
      archetype: backend-api-service
      primary_stack: python-fastapi-uv-ruff-orjson-polars
      smoke_tests: true
      integration_tests: false
      seed_data: true
      dokku: false

  - number: 4
    codename: webhook-receiver
    category: A
    category_name: Single-Backend API Services
    prompt: |
      Build a FastAPI service that receives, validates, and normalizes webhook events,
      persisting raw and normalized forms to MongoDB with Redis-backed rate limiting on the
      ingest endpoint. Seed with varied event shapes to exercise the normalization path.
      Smoke tests verify ingest, rate-limiter response, and normalization correctness.
    new_repo_args:
      archetype: backend-api-service
      primary_stack: python-fastapi-uv-ruff-orjson-polars
      smoke_tests: true
      integration_tests: false
      seed_data: true
      dokku: false

  - number: 5
    codename: scheduled-enrichment
    category: A
    category_name: Single-Backend API Services
    prompt: |
      Build a FastAPI service with a PostgreSQL-backed enrichment pipeline that runs on a
      configurable schedule, processing pending records with Polars and writing enriched
      results back. Expose a trigger-and-inspect endpoint for testing without waiting for
      the schedule. Smoke tests verify the trigger endpoint returns an enrichment summary.
    new_repo_args:
      archetype: backend-api-service
      primary_stack: python-fastapi-uv-ruff-orjson-polars
      smoke_tests: true
      integration_tests: false
      seed_data: true
      dokku: false

  - number: 6
    codename: hono-internal-api
    category: A
    category_name: Single-Backend API Services
    prompt: |
      Build a lean internal API using Hono on Bun with SQLite, exposing three
      domain-specific endpoints. Keep the service self-contained with no external
      infrastructure beyond SQLite. Smoke tests verify all three endpoints return correct
      responses with seeded fixture data.
    new_repo_args:
      archetype: backend-api-service
      primary_stack: typescript-hono-bun
      smoke_tests: true
      integration_tests: false
      seed_data: true
      dokku: false

  - number: 7
    codename: hono-bff-aggregator
    category: A
    category_name: Single-Backend API Services
    prompt: |
      Build a Hono/Bun Backend-for-Frontend that aggregates responses from multiple upstream
      services into a unified payload with graceful degradation when an upstream is
      unavailable. Configure for Dokku deployment with health check and Procfile. Smoke
      tests verify the aggregated response and the degraded-upstream fallback path.
    new_repo_args:
      archetype: dokku-deployable-service
      primary_stack: typescript-hono-bun
      smoke_tests: true
      integration_tests: false
      seed_data: true
      dokku: true

  - number: 8
    codename: go-parquet-reports
    category: A
    category_name: Single-Backend API Services
    prompt: |
      Build a Go/Echo reporting service that reads Parquet files via DuckDB, exposing
      endpoints for filtered, sorted, and paginated report output. Seed fixture Parquet
      files with enough rows to verify pagination boundaries. Smoke tests confirm filter,
      sort, and page-boundary responses.
    new_repo_args:
      archetype: backend-api-service
      primary_stack: go-echo
      smoke_tests: true
      integration_tests: false
      seed_data: true
      dokku: false

  - number: 9
    codename: go-file-upload
    category: A
    category_name: Single-Backend API Services
    prompt: |
      Build a Go/Echo service that accepts file uploads, validates format and size
      constraints, normalizes content to a canonical schema, and persists metadata to
      PostgreSQL. Seed with fixture records representing prior uploads. Smoke tests verify
      upload acceptance, rejection of invalid files, and metadata retrieval.
    new_repo_args:
      archetype: backend-api-service
      primary_stack: go-echo
      smoke_tests: true
      integration_tests: false
      seed_data: true
      dokku: false

  - number: 10
    codename: rust-event-ingest
    category: A
    category_name: Single-Backend API Services
    prompt: |
      Build a high-throughput Rust/Axum ingest service that batches incoming events and
      flushes to PostgreSQL on a configurable interval or batch-size threshold. Seed with
      fixture event streams. Smoke tests verify the ingest endpoint accepts batches and
      the PostgreSQL table receives flushed records.
    new_repo_args:
      archetype: backend-api-service
      primary_stack: rust-axum-modern
      smoke_tests: true
      integration_tests: false
      seed_data: true
      dokku: false

  - number: 11
    codename: rust-batch-classifier
    category: A
    category_name: Single-Backend API Services
    prompt: |
      Build a Rust/Axum classification service that accepts feature vectors, scores them
      against a precomputed model, and returns classification labels with confidence scores.
      Embed fixture model state at startup; no live storage required. Smoke tests verify the
      classify endpoint returns expected labels for known input vectors.
    new_repo_args:
      archetype: backend-api-service
      primary_stack: rust-axum-modern
      smoke_tests: true
      integration_tests: false
      seed_data: true
      dokku: false

  - number: 12
    codename: phoenix-scheduling
    category: A
    category_name: Single-Backend API Services
    prompt: |
      Build an Elixir/Phoenix service with Ecto and PostgreSQL that manages availability
      windows for a scheduling domain, supporting create, query, and conflict-detection
      endpoints. Seed with overlapping and non-overlapping fixture windows. Smoke tests
      verify conflict detection and availability query endpoints.
    new_repo_args:
      archetype: backend-api-service
      primary_stack: elixir-phoenix
      smoke_tests: true
      integration_tests: false
      seed_data: true
      dokku: false

  - number: 13
    codename: scala-financial-reports
    category: A
    category_name: Single-Backend API Services
    prompt: |
      Build a Scala/Tapir+ZIO financial reporting service that generates period summaries
      and period-over-period comparison reports from PostgreSQL data. Seed with multi-period
      fixture records. Smoke tests verify at least one summary and one comparison endpoint
      return correctly computed results.
    new_repo_args:
      archetype: backend-api-service
      primary_stack: scala-tapir-http4s-zio
      smoke_tests: true
      integration_tests: false
      seed_data: true
      dokku: false

  - number: 14
    codename: kotlin-invoice-tracker
    category: A
    category_name: Single-Backend API Services
    prompt: |
      Build a Kotlin/http4k+Exposed CRUD service for tracking invoices with status
      transitions (draft, sent, paid, overdue) and filter-by-status list endpoints backed
      by PostgreSQL. Seed with invoices across all status values. Smoke tests verify create,
      status transition, and filtered list endpoints.
    new_repo_args:
      archetype: backend-api-service
      primary_stack: kotlin-http4k-exposed
      smoke_tests: true
      integration_tests: false
      seed_data: true
      dokku: false

  - number: 15
    codename: clojure-preferences
    category: A
    category_name: Single-Backend API Services
    prompt: |
      Build a Clojure/Kit+next.jdbc service that stores and retrieves user preference maps
      in PostgreSQL, supporting get, set, and partial-update operations per user key. Seed
      with fixture users and preference maps. Smoke tests verify get, set, and partial-update
      return consistent results.
    new_repo_args:
      archetype: backend-api-service
      primary_stack: clojure-kit-nextjdbc-hiccup
      smoke_tests: true
      integration_tests: false
      seed_data: true
      dokku: false

  - number: 16
    codename: ruby-content-store
    category: A
    category_name: Single-Backend API Services
    prompt: |
      Build a Ruby/Hanami service that stores content records in PostgreSQL, exposing
      paginated list endpoints with field-level filtering. Seed with enough fixture records
      to verify pagination boundaries and filter combinations. Smoke tests confirm paginated
      list and filtered queries return correct subsets.
    new_repo_args:
      archetype: backend-api-service
      primary_stack: ruby-hanami
      smoke_tests: true
      integration_tests: false
      seed_data: true
      dokku: false

  - number: 17
    codename: nim-json-filter
    category: A
    category_name: Single-Backend API Services
    prompt: |
      Build a Nim/Jester service that filters fixture JSON documents by field predicates,
      returning matching subsets without any live database dependency. Load fixture JSON at
      startup and serve filter queries in memory. Smoke tests verify multiple predicate
      combinations against known fixture documents.
    new_repo_args:
      archetype: backend-api-service
      primary_stack: nim-jester-happyx
      smoke_tests: true
      integration_tests: false
      seed_data: true
      dokku: false

  - number: 18
    codename: dart-audit-log
    category: A
    category_name: Single-Backend API Services
    prompt: |
      Build a Dart/Dartfrog service that appends audit events to a PostgreSQL audit trail,
      supporting append and time-bounded query endpoints. Seed with fixture audit entries
      spanning multiple time ranges. Smoke tests verify append and bounded-query endpoints.
    new_repo_args:
      archetype: backend-api-service
      primary_stack: dart-dartfrog
      smoke_tests: true
      integration_tests: false
      seed_data: true
      dokku: false

  - number: 19
    codename: ocaml-metadata-store
    category: A
    category_name: Single-Backend API Services
    prompt: |
      Build an OCaml/Dream+Caqti+TyXML service that stores and retrieves project metadata
      records in PostgreSQL, supporting CRUD and list-with-filter. Seed with fixture metadata
      records. Smoke tests verify create, read, update, delete, and filtered list endpoints.
    new_repo_args:
      archetype: backend-api-service
      primary_stack: ocaml-dream-caqti-tyxml
      smoke_tests: true
      integration_tests: false
      seed_data: true
      dokku: false

  - number: 20
    codename: crystal-cache-proxy
    category: A
    category_name: Single-Backend API Services
    prompt: |
      Build a Crystal/Kemal+Avram caching proxy that wraps a PostgreSQL query behind a
      time-bounded cache, returning cache-hit headers when served from cache and refreshing
      on expiry. Seed with fixture data. Smoke tests verify a cold-cache miss, a warm-cache
      hit, and a cache-refresh path.
    new_repo_args:
      archetype: backend-api-service
      primary_stack: crystal-kemal-avram
      smoke_tests: true
      integration_tests: false
      seed_data: true
      dokku: false

  - number: 21
    codename: fastapi-dokku-analytics
    category: A
    category_name: Single-Backend API Services
    prompt: |
      Build a FastAPI analytics service backed by PostgreSQL and Polars, configured for
      Dokku deployment with a Procfile, health endpoint, and release script. Expose at least
      two aggregate query endpoints. Smoke tests verify health and at least one aggregate
      endpoint after seed.
    new_repo_args:
      archetype: dokku-deployable-service
      primary_stack: python-fastapi-uv-ruff-orjson-polars
      smoke_tests: true
      integration_tests: false
      seed_data: true
      dokku: true

  # ── Category B — Backend-Driven UI ───────────────────────────────────────

  - number: 22
    codename: faceted-dashboard
    category: B
    category_name: Backend-Driven UI
    prompt: |
      Build a FastAPI+HTMX server-rendered dashboard with Tailwind and Plotly, supporting
      faceted include/exclude filtering with dynamic counts recalculated on each filter
      change. Seed with multi-dimensional fixture data. Playwright integration tests verify
      that applying and removing facets updates both the chart and the count labels.
    new_repo_args:
      archetype: backend-api-service
      primary_stack: python-fastapi-uv-ruff-orjson-polars
      smoke_tests: true
      integration_tests: true
      seed_data: true
      dokku: false

  - number: 23
    codename: search-sort-paginate
    category: B
    category_name: Backend-Driven UI
    prompt: |
      Build a FastAPI+HTMX service with keyword search, multi-field sort, and infinite-scroll
      pagination via HTMX partial responses. Seed with enough fixture records to verify
      pagination boundaries and sort correctness. Playwright tests verify search results,
      sort order toggling, and scroll-triggered page loads.
    new_repo_args:
      archetype: backend-api-service
      primary_stack: python-fastapi-uv-ruff-orjson-polars
      smoke_tests: true
      integration_tests: true
      seed_data: true
      dokku: false

  - number: 24
    codename: split-filter-panel
    category: B
    category_name: Backend-Driven UI
    prompt: |
      Build a FastAPI+HTMX service with a split include/exclude facet panel maintaining
      server-side filter state across partial renders. Seed with fixture records across
      multiple categories. Playwright tests verify that adding an include filter reduces
      the count and that adding an exclude filter further narrows the intersection.
    new_repo_args:
      archetype: backend-api-service
      primary_stack: python-fastapi-uv-ruff-orjson-polars
      smoke_tests: true
      integration_tests: true
      seed_data: true
      dokku: false

  - number: 25
    codename: shared-query-chart-table
    category: B
    category_name: Backend-Driven UI
    prompt: |
      Build a FastAPI+HTMX+Plotly service that issues a single database query and renders
      both a chart and a table from the same result set, updating both with a single HTMX
      swap. Seed with fixture data producing distinguishable chart and table values. Playwright
      tests verify chart and table consistency after filter changes.
    new_repo_args:
      archetype: backend-api-service
      primary_stack: python-fastapi-uv-ruff-orjson-polars
      smoke_tests: true
      integration_tests: true
      seed_data: true
      dokku: false

  - number: 26
    codename: report-browser-cuj
    category: B
    category_name: Backend-Driven UI
    prompt: |
      Build a FastAPI+HTMX+Tailwind report browser designed around critical user journeys:
      search, select, view detail, and export. Seed with representative fixture reports.
      Playwright tests cover the full CUJ—search → select → detail → export—verifying
      each transition completes correctly.
    new_repo_args:
      archetype: backend-api-service
      primary_stack: python-fastapi-uv-ruff-orjson-polars
      smoke_tests: true
      integration_tests: true
      seed_data: true
      dokku: false

  - number: 27
    codename: compound-facet-dashboard
    category: B
    category_name: Backend-Driven UI
    prompt: |
      Build a FastAPI+HTMX dashboard with compound multi-dimension AND filters that compute
      intersection counts across all active facets simultaneously. Seed with fixture data
      across at least three dimensions. Playwright tests verify that two active facets from
      different dimensions return only records matching both and the displayed count is accurate.
    new_repo_args:
      archetype: backend-api-service
      primary_stack: python-fastapi-uv-ruff-orjson-polars
      smoke_tests: true
      integration_tests: true
      seed_data: true
      dokku: false

  # ── Category C — Data Acquisition and Pipelines ───────────────────────────

  - number: 28
    codename: python-api-acquisition
    category: C
    category_name: Data Acquisition and Pipelines
    prompt: |
      Build a Python data acquisition service that paginates through an external REST API
      with exponential backoff on transient errors, archives each raw response, and loads
      normalized records into PostgreSQL. Include a fixture server for deterministic tests.
      Smoke tests verify all fixture pages are processed and raw archives are created.
    new_repo_args:
      archetype: data-acquisition-service
      primary_stack: python-fastapi-uv-ruff-orjson-polars
      smoke_tests: true
      integration_tests: false
      seed_data: true
      dokku: false

  - number: 29
    codename: go-api-ingestion
    category: C
    category_name: Data Acquisition and Pipelines
    prompt: |
      Build a Go data ingestion service that fetches daily JSON payloads from an external
      API, applies exponential backoff on failure, emits structured log events, and persists
      normalized records to PostgreSQL. Seed fixture JSON responses for deterministic runs.
      Smoke tests verify the daily fetch loop completes and records are persisted.
    new_repo_args:
      archetype: data-acquisition-service
      primary_stack: go-echo
      smoke_tests: true
      integration_tests: false
      seed_data: true
      dokku: false

  - number: 30
    codename: python-scraper
    category: C
    category_name: Data Acquisition and Pipelines
    prompt: |
      Build a Python scraper that fetches HTML pages, extracts structured records using a
      defined schema, normalizes and deduplicates with Polars, persists to PostgreSQL, and
      archives raw HTML. Seed with fixture HTML pages for deterministic execution. Smoke
      tests verify extraction correctness and raw archive creation.
    new_repo_args:
      archetype: data-acquisition-service
      primary_stack: python-fastapi-uv-ruff-orjson-polars
      smoke_tests: true
      integration_tests: false
      seed_data: true
      dokku: false

  - number: 31
    codename: bun-scraper
    category: C
    category_name: Data Acquisition and Pipelines
    prompt: |
      Build a TypeScript/Bun scraper that parses HTML pages, extracts records into
      Drizzle-managed PostgreSQL tables, and runs fixture-driven tests using static HTML
      snapshots. Smoke tests verify that parsing fixture pages produces the expected record
      count and correct field values.
    new_repo_args:
      archetype: data-acquisition-service
      primary_stack: typescript-hono-bun
      smoke_tests: true
      integration_tests: false
      seed_data: true
      dokku: false

  - number: 32
    codename: csv-etl-pipeline
    category: C
    category_name: Data Acquisition and Pipelines
    prompt: |
      Build a Python ETL pipeline that reads heterogeneous CSV files, normalizes schemas
      with Polars, and writes deterministic Parquet output with consistent column types and
      sort order. Smoke tests verify that processing a fixture CSV set produces byte-identical
      Parquet output on repeated runs.
    new_repo_args:
      archetype: data-pipeline
      primary_stack: duckdb-trino-polars
      smoke_tests: true
      integration_tests: false
      seed_data: true
      dokku: false

  - number: 33
    codename: json-etl-pipeline
    category: C
    category_name: Data Acquisition and Pipelines
    prompt: |
      Build a Python ETL pipeline that reads partner JSON exports, enriches records with
      Polars transformations, and bulk-inserts normalized results into PostgreSQL with
      provenance metadata. Seed with fixture JSON exports. Smoke tests verify enrichment
      correctness and row counts after bulk insert.
    new_repo_args:
      archetype: data-pipeline
      primary_stack: python-fastapi-uv-ruff-orjson-polars
      smoke_tests: true
      integration_tests: false
      seed_data: true
      dokku: false

  - number: 34
    codename: duckdb-parquet-analytics
    category: C
    category_name: Data Acquisition and Pipelines
    prompt: |
      Build a local DuckDB+Parquet+CSV analytical pipeline that reads CSV source files,
      transforms them into Parquet partitions, and executes DuckDB analytical queries
      against the partitions. Smoke tests verify that processing fixture CSVs produces
      correct aggregate outputs from DuckDB queries.
    new_repo_args:
      archetype: data-pipeline
      primary_stack: duckdb-trino-polars
      smoke_tests: true
      integration_tests: false
      seed_data: true
      dokku: false

  - number: 35
    codename: multi-source-sync
    category: C
    category_name: Data Acquisition and Pipelines
    prompt: |
      Build a multi-source coordination service that subscribes to NATS JetStream streams
      from two sources, deduplicates and reconciles incoming events, and persists merged
      records to PostgreSQL. Seed with overlapping fixture events from both sources. Smoke
      tests verify deduplication logic and merged record correctness.
    new_repo_args:
      archetype: multi-source-sync-platform
      primary_stack: python-fastapi-uv-ruff-orjson-polars
      smoke_tests: true
      integration_tests: false
      seed_data: true
      dokku: false

  - number: 36
    codename: classification-enrichment
    category: C
    category_name: Data Acquisition and Pipelines
    prompt: |
      Build a Python enrichment service that classifies incoming records using a precomputed
      label set, appends classification tags and confidence scores, and persists enriched
      records with provenance metadata to PostgreSQL. Seed with fixture records spanning
      multiple classification outcomes. Smoke tests verify tag assignment and confidence
      score ranges.
    new_repo_args:
      archetype: data-acquisition-service
      primary_stack: python-fastapi-uv-ruff-orjson-polars
      smoke_tests: true
      integration_tests: false
      seed_data: true
      dokku: false

  - number: 37
    codename: recurring-sync
    category: C
    category_name: Data Acquisition and Pipelines
    prompt: |
      Build a Python recurring-sync service with a configurable schedule, exponential
      backoff with jitter on transient errors, and raw archival of each sync run's source
      data. Expose a trigger endpoint for on-demand sync. Smoke tests verify the trigger
      initiates a sync, backoff is applied on simulated failure, and raw archives are created.
    new_repo_args:
      archetype: data-acquisition-service
      primary_stack: python-fastapi-uv-ruff-orjson-polars
      smoke_tests: true
      integration_tests: false
      seed_data: true
      dokku: false

  - number: 38
    codename: elixir-data-acquisition
    category: C
    category_name: Data Acquisition and Pipelines
    prompt: |
      Build an Elixir/Phoenix service with a GenServer that paginates through an external
      API, persists normalized records to PostgreSQL via Ecto, and supports fixture-driven
      verification of paginated acquisition. Smoke tests verify all fixture pages are
      processed and the expected record count is persisted.
    new_repo_args:
      archetype: data-acquisition-service
      primary_stack: elixir-phoenix
      smoke_tests: true
      integration_tests: false
      seed_data: true
      dokku: false

  # ── Category D — ML and Data Science ─────────────────────────────────────

  - number: 39
    codename: sklearn-inference
    category: D
    category_name: ML and Data Science
    prompt: |
      Build a FastAPI inference service that loads a pre-trained scikit-learn model from
      disk at startup and exposes a predict endpoint accepting feature vectors and returning
      classification labels. Include a fixture model for deterministic testing. Smoke tests
      verify expected labels are returned for known input vectors.
    new_repo_args:
      archetype: backend-api-service
      primary_stack: python-fastapi-uv-ruff-orjson-polars
      smoke_tests: true
      integration_tests: false
      seed_data: true
      dokku: false

  - number: 40
    codename: recommendation-engine
    category: D
    category_name: ML and Data Science
    prompt: |
      Build a FastAPI recommendation service that reads precomputed recommendation records
      from PostgreSQL and returns ordered recommendation lists for a given entity. Seed with
      fixture recommendation data. Smoke tests verify the endpoint returns the correct top-N
      results for known entity IDs.
    new_repo_args:
      archetype: backend-api-service
      primary_stack: python-fastapi-uv-ruff-orjson-polars
      smoke_tests: true
      integration_tests: false
      seed_data: true
      dokku: false

  - number: 41
    codename: arima-forecasting
    category: D
    category_name: ML and Data Science
    prompt: |
      Build a FastAPI forecasting service backed by statsmodels ARIMA that accepts a
      time-series identifier, fits a model to historical data, and returns a forecast with
      confidence intervals. Seed with fixture time-series data. Smoke tests verify the
      forecast endpoint returns the expected number of future periods with non-null bounds.
    new_repo_args:
      archetype: backend-api-service
      primary_stack: python-fastapi-uv-ruff-orjson-polars
      smoke_tests: true
      integration_tests: false
      seed_data: true
      dokku: false

  - number: 42
    codename: semantic-search-qdrant
    category: D
    category_name: ML and Data Science
    prompt: |
      Build a FastAPI semantic search service that indexes a fixture corpus into Qdrant using
      sentence-transformers embeddings, then exposes a query endpoint returning semantically
      similar documents. Smoke tests verify that a known phrase query returns the fixture
      document with the highest semantic similarity.
    new_repo_args:
      archetype: local-rag-system
      primary_stack: qdrant
      smoke_tests: true
      integration_tests: false
      seed_data: true
      dokku: false

  - number: 43
    codename: xgboost-serving
    category: D
    category_name: ML and Data Science
    prompt: |
      Build a FastAPI serving layer for a pre-trained XGBoost model that returns predictions
      with feature importance metadata alongside each response. Load a fixture model at
      startup. Smoke tests verify the prediction endpoint returns valid scores and non-empty
      feature importance for known input vectors.
    new_repo_args:
      archetype: backend-api-service
      primary_stack: python-fastapi-uv-ruff-orjson-polars
      smoke_tests: true
      integration_tests: false
