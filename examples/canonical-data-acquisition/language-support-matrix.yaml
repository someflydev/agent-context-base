version: 2
capability: canonical-data-acquisition
shared_examples:
  - name: canonical-data-acquisition-index
    path: examples/canonical-data-acquisition/README.md
    verification_level: structure-verified
  - name: canonical-data-acquisition-language-support-matrix
    path: examples/canonical-data-acquisition/language-support-matrix.yaml
    verification_level: syntax-checked
languages:
  - language: Python
    stack: python-fastapi-uv-ruff-orjson-polars
    stack_specific_examples:
      - fastapi-source-sync-example
    verification_posture: behavior-verified
    coverage_note: real code with raw archival, replay, provenance, and retry behavior verified directly in Python tests
    fallback_example: fastapi-endpoint-example
    fallback_path: examples/canonical-api/fastapi-endpoint-example.py
    fallback_verification_level: behavior-verified
    follow_on_prompt: PROMPT_34
  - language: Go
    stack: go-echo
    stack_specific_examples:
      - go-echo-source-sync-example
    verification_posture: syntax-checked
    coverage_note: real code, gofmt-parsed and structure-verified only; no runtime acquisition harness yet
    fallback_example: go-echo-handler-example
    fallback_path: examples/canonical-api/go-echo-handler-example.go
    fallback_verification_level: syntax-checked
    follow_on_prompt: PROMPT_34
  - language: Elixir
    stack: elixir-phoenix
    stack_specific_examples:
      - phoenix-source-sync-example
    verification_posture: structure-verified
    coverage_note: real Phoenix-adjacent acquisition code with controller and sync service boundaries, but no native parse, compile, or runtime coverage yet
    fallback_example: phoenix-route-controller-example
    fallback_path: examples/canonical-api/phoenix-route-controller-example.ex
    fallback_verification_level: structure-verified
    follow_on_prompt: PROMPT_35
  - language: Rust
    stack: rust-axum-modern
    stack_specific_examples:
      - rust-axum-source-sync-example
    verification_posture: syntax-checked
    coverage_note: real code, rustfmt-parsed and structure-verified only; no runtime acquisition harness yet
    fallback_example: rust-axum-route-example
    fallback_path: examples/canonical-api/rust-axum-route-example.rs
    fallback_verification_level: syntax-checked
    follow_on_prompt: PROMPT_34
  - language: TypeScript
    stack: typescript-hono-bun
    stack_specific_examples:
      - typescript-hono-source-sync-example
    verification_posture: syntax-checked
    coverage_note: real code, tsc-checked with local Hono and Bun shims only; no Bun runtime harness yet
    fallback_example: typescript-hono-handler-example
    fallback_path: examples/canonical-api/typescript-hono-handler-example.ts
    fallback_verification_level: syntax-checked
    follow_on_prompt: PROMPT_34
  - language: Nim
    stack: nim-jester-happyx
    stack_specific_examples:
      - nim-jester-source-sync-example
    verification_posture: structure-verified
    coverage_note: real Jester-oriented acquisition code with raw capture and replay boundaries, but verification remains source-structure only
    fallback_example: nim-jester-data-endpoint-example
    fallback_path: examples/canonical-api/nim-jester-data-endpoint-example.nim
    fallback_verification_level: structure-verified
    follow_on_prompt: PROMPT_35
  - language: Zig
    stack: zig-zap-jetzig
    stack_specific_examples:
      - zig-zap-source-sync-example
    verification_posture: structure-verified
    coverage_note: real Zap-oriented acquisition code with explicit ownership and archive boundaries, but no native Zig parse or runtime verification for this surface
    fallback_example: zig-zap-data-endpoint-example
    fallback_path: examples/canonical-api/zig-zap-data-endpoint-example.zig
    fallback_verification_level: structure-verified
    follow_on_prompt: PROMPT_35
  - language: Crystal
    stack: crystal-kemal-avram
    stack_specific_examples:
      - crystal-kemal-source-sync-example
    verification_posture: structure-verified
    coverage_note: real Kemal plus Avram-adjacent acquisition code with checkpoint and provenance boundaries, but verification remains structural only
    fallback_example: crystal-kemal-avram-data-endpoint-example
    fallback_path: examples/canonical-api/crystal-kemal-avram-data-endpoint-example.cr
    fallback_verification_level: structure-verified
    follow_on_prompt: PROMPT_35
