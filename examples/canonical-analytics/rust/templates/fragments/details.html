<div class="bg-white shadow rounded-lg p-6 h-full">
    <h3 class="text-lg font-medium text-gray-900 mb-4">Details: {{ service_name }}</h3>
    {% if top_incidents.is_empty() %}
        <p class="text-gray-500 text-sm">No recent incidents.</p>
    {% else %}
        <ul class="space-y-4">
        {% for incident in top_incidents %}
            <li class="border-b pb-2 last:border-0 text-sm">
                <div class="flex justify-between">
                    <span class="font-medium text-gray-900">{{ incident.severity }}</span>
                    <span class="text-gray-500">{{ incident.timestamp }}</span>
                </div>
                <div class="text-gray-600 mt-1">MTTR: {{ incident.mttr_mins }}m</div>
            </li>
        {% endfor %}
        </ul>
    {% endif %}
</div>
