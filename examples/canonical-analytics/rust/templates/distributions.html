{% extends "base.html" %}

{% block content %}
<div class="space-y-6">
    <h1 class="text-2xl font-bold text-gray-900">Distributions</h1>
    
    <div class="bg-white shadow rounded-lg p-6">
        <form method="get" hx-get="/fragments/chart" hx-target="#content-panel" hx-swap="innerHTML" hx-push-url="true" class="flex gap-4 items-end">
            <input type="hidden" name="view" value="distributions">
            
            <div class="flex-1">
                <label class="block text-sm font-medium text-gray-700">Service</label>
                <input type="text" name="services" placeholder="e.g. auth-service" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm" />
            </div>
            
            <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Filter</button>
        </form>
    </div>

    <div id="content-panel" class="grid grid-cols-2 gap-6">
        <div class="bg-white shadow rounded-lg p-6">
            <div data-figure="{{ figure_json_a|e }}" class="w-full h-96"></div>
        </div>
        <div class="bg-white shadow rounded-lg p-6">
            <div data-figure="{{ figure_json_b|e }}" class="w-full h-96"></div>
        </div>
    </div>
</div>
{% endblock %}
