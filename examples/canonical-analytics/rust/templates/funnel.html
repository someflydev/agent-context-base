{% extends "base.html" %}

{% block content %}
<div class="space-y-6">
    <h1 class="text-2xl font-bold text-gray-900">Funnel</h1>
    
    <div class="bg-white shadow rounded-lg p-6">
        <form method="get" hx-get="/fragments/chart" hx-target="#content-panel" hx-swap="innerHTML" hx-push-url="true" class="flex gap-4 items-end">
            <input type="hidden" name="view" value="funnel">
            
            <div class="flex-1">
                <label class="block text-sm font-medium text-gray-700">Environment</label>
                <select name="environment" multiple class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm">
                    <option value="production">Production</option>
                    <option value="staging">Staging</option>
                    <option value="development">Development</option>
                </select>
            </div>
            
            <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Filter</button>
        </form>
    </div>

    <div id="content-panel" class="bg-white shadow rounded-lg p-6">
        <div data-figure="{{ figure_json|e }}" class="w-full h-96"></div>
    </div>
</div>
{% endblock %}
