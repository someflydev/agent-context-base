version: "3.9"

services:
  job-api:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ../fixtures:/fixtures:ro
      - ./job_api.py:/app/job_api.py:ro
    command: python3 /app/job_api.py
    ports:
      - "8765:8765"
    environment:
      JOBS_FILE: /fixtures/jobs-large.json
      EVENTS_FILE: /fixtures/events-large.json
