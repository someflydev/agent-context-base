name: "Python Terminal - Typer + Textual"
language: python
tier: dual-mode
cli_lib: typer
tui_lib: textual
description: >
  Flagship Python terminal stack. Typer builds ergonomic CLI subcommands with
  type-driven argument parsing. Textual provides a modern full-screen TUI
  framework with CSS-styled widgets and an async event loop.
when_to_use: >
  Python dual-mode operator consoles, job monitors, dataset explorers, or any
  tool needing both scriptable CLI and interactive TUI surfaces.
tradeoffs: >
  Textual requires Python 3.8+ and is async-first. Adds about 5 MB of
  dependency weight. Excellent for richly styled UIs; less suited for raw-TTY
  and Unix-pipe workflows.
canonical_example: examples/canonical-terminal/python-typer-textual/
docs: context/archetypes/terminal-dual-mode.md
